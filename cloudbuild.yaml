steps:
  # Step 1: Build the container image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/circlesave/circlesave:latest',
      '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/circlesave/circlesave:$COMMIT_SHA',
      '.'
    ]

  # Step 2: Push the container image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/circlesave/circlesave:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/circlesave/circlesave:$COMMIT_SHA']

  # Step 3: Deploy the container image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'circlesave',
      '--image', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/circlesave/circlesave:$COMMIT_SHA',
      '--region', 'asia-southeast1',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/circlesave/circlesave:latest'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/circlesave/circlesave:$COMMIT_SHA'
