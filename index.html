<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CircleSave — Your circle. Your savings. Your win.</title>
    <!-- Standard Browser Favicons (Served directly from /public) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=1" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png?v=1" />

    <!-- Apple Devices Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=1" />
  </head>
  <body class="bg-[#FAFAFA] text-[#111827]">
    <!-- Hidden form wrapper for Netlify form crawler recognition -->
    <div style="display: none;">
      <form name="contact" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="contact" />
        
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Contact Us</button>
      </form>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
